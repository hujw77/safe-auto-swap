name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SOR_ROUTER_BASE_URL: ${{ vars.VITE_SOR_ROUTER_BASE_URL }}
          VITE_OKX_BASE_URL: ${{ vars.VITE_OKX_BASE_URL }}
          VITE_OKX_ACCESS_KEY: ${{ vars.VITE_OKX_ACCESS_KEY }}
          VITE_OKX_SECRET_KEY: ${{ vars.VITE_OKX_SECRET_KEY }}
          VITE_OKX_ACCESS_PASSPHRASE: ${{ vars.VITE_OKX_ACCESS_PASSPHRASE }}
          VITE_OKX_ACCESS_PROJECT: ${{ vars.VITE_OKX_ACCESS_PROJECT }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
